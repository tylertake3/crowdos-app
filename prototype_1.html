<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StuntOS — Stunt Schedule Breakdown</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1013; --panel:#15181d; --panel2:#1b1f26; --line:#262c35; --line2:#333b47;
  --ink:#eceff3; --sub:#8b95a3; --faint:#5c6673;
  --hv:#4d9dff; --hv2:#7cbcff; --hv-dim:rgba(77,157,255,.14); --hv-line:rgba(77,157,255,.42);
  --crowd:#5b8def; --crowd-dim:rgba(91,141,239,.15);
  --money:#ffd666; --note:#e8c268; --notebg:rgba(232,194,104,.08);
  --dayext:#ffc53d; --dayint:#c9cfd8; --nightint:#5b8def; --nightext:#4cc38a; --dusk:#c08ae0;
  --tipbg:#000; --tipink:#fff; --topbg:rgba(14,16,19,.88); --hover:rgba(255,255,255,.02);
  --mono:'IBM Plex Mono','SF Mono',Menlo,Consolas,monospace;
  --cond:'Barlow Condensed','Arial Narrow',Arial,sans-serif;
  --body:Inter,-apple-system,'Segoe UI',Roboto,sans-serif;
  --r:12px;
}
body.light{
  --bg:#eef1f5; --panel:#ffffff; --panel2:#f5f7fa; --line:#e0e5ec; --line2:#c9d1dc;
  --ink:#171b21; --sub:#5c6673; --faint:#98a2b0;
  --money:#9a6b00; --note:#8a6a1f; --notebg:rgba(154,107,0,.07);
  --dayint:#8d97a5;
  --tipbg:#1b1f26; --tipink:#fff; --topbg:rgba(255,255,255,.88); --hover:rgba(0,0,0,.025);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important;animation:none!important}}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:13.5px;line-height:1.5;
  background-image:radial-gradient(1000px 400px at 70% -100px, var(--hv-dim), transparent)}
button{font-family:inherit;cursor:pointer;color:inherit}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--hv);outline-offset:2px}
::selection{background:var(--hv);color:#000}
body.hide-costs .costable{display:none!important}

#tipbox{position:fixed;z-index:999;display:none;background:var(--tipbg);color:var(--tipink);border:1px solid var(--line2);
  font-size:11px;font-weight:600;font-family:var(--body);padding:6px 11px;border-radius:7px;max-width:360px;line-height:1.45;
  pointer-events:none;letter-spacing:.02em;box-shadow:0 6px 20px rgba(0,0,0,.35)}

.topbar{background:var(--topbg);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:40}
.brand{font-family:var(--cond);font-weight:700;font-size:22px;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.brand .mark{width:22px;height:22px;border-radius:6px;background:var(--hv);display:grid;place-items:center;color:#000;font-size:13px;font-weight:800;transform:rotate(-8deg)}
.brand em{font-style:normal;color:var(--hv)}
.brand small{font-family:var(--body);display:block;font-size:9.5px;letter-spacing:.24em;color:var(--faint);font-weight:600}
.topbar .grow{flex:1}
.srcbar{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.srcbar button{border:none;background:none;padding:8px 15px;font-size:12px;font-weight:600;color:var(--sub);border-right:1px solid var(--line);display:flex;align-items:center;gap:7px}
.srcbar button:last-child{border-right:none}
.srcbar button.on{background:var(--hv);color:#000}
.srcbar button .k{font-family:var(--mono);font-size:9px;opacity:.7}
.tb-btn{background:var(--panel2);border:1px solid var(--line2);border-radius:8px;padding:7px 14px;font-size:12.5px;font-weight:600}
.tb-btn:hover{border-color:var(--hv-line);color:var(--hv)}
#status{font-size:11.5px;color:var(--sub)}
.colourpill{font-size:9.5px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;border:1px solid var(--hv-line);color:var(--hv);border-radius:20px;padding:3px 11px}

.wrap{max-width:1260px;margin:0 auto;padding:20px}
.hidden{display:none!important}

.summary{display:grid;grid-template-columns:1.4fr repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px}
.stat .n{font-family:var(--cond);font-size:34px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.stat .l{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--sub);margin-top:6px;font-weight:600}
.stat.hero{background:linear-gradient(135deg,var(--hv) 0%,var(--hv2) 100%);color:#0c0d0f;border:none}
.stat.hero .n{font-size:40px}
.stat.hero .l{color:rgba(0,0,0,.62)}
.stat.money .n{color:var(--money)}

.ratesbar{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
.ratesbar summary{list-style:none;cursor:pointer;padding:11px 16px;display:flex;align-items:center;gap:10px;font-weight:600;font-size:12.5px;color:var(--sub)}
.ratesbar summary::-webkit-details-marker{display:none}
.ratesbar summary .dot{width:8px;height:8px;border-radius:50%;background:var(--hv)}
.ratesbar summary .hint{font-weight:500;color:var(--faint);font-size:11.5px}
.ratesbar[open] summary{border-bottom:1px solid var(--line)}
.rates-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;padding:16px;align-items:end}
.rfield{display:flex;flex-direction:column;justify-content:flex-end}
.rfield label{display:flex;align-items:flex-end;min-height:26px;font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--sub);font-weight:700;margin-bottom:5px}
.rfield .inwrap{display:flex;align-items:center;background:var(--panel2);border:1px solid var(--line2);border-radius:8px;overflow:hidden}
.rfield .inwrap span{padding:0 0 0 10px;color:var(--faint);font-family:var(--mono);font-size:12px}
.rfield input{width:100%;border:none;background:none;color:var(--ink);padding:9px 10px;font-family:var(--mono);font-size:13px;font-weight:600}
.rates-note{grid-column:1/-1;font-size:11px;color:var(--faint)}

.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;position:sticky;top:55px;z-index:30;background:var(--bg);padding:8px 0}
.tabs{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.tabs button{border:none;background:none;padding:9px 18px;font-size:12.5px;font-weight:600;color:var(--sub);border-right:1px solid var(--line)}
.tabs button:last-child{border-right:none}
.tabs button.on{background:var(--hv);color:#000}
.chk{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--sub);background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:8px 13px;cursor:pointer}
.searchwrap{display:flex;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.searchwrap input{border:none;background:none;color:var(--ink);padding:9px 12px;font-size:12.5px;width:210px;font-family:inherit}
.searchwrap input::placeholder{color:var(--faint)}
.searchwrap button{border:none;background:none;color:var(--faint);padding:0 10px;font-size:12px;display:none}
.searchwrap.hasq button{display:block}
.searchwrap button:hover{color:var(--ink)}
.strip.hit{outline:2px solid var(--hv);outline-offset:-2px}
.chk input{accent-color:var(--hv)}
.controls .grow{flex:1}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:10.5px;color:var(--faint)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:4px;height:13px;border-radius:2px;display:inline-block}

.daycard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.daycard.has-stunts{border-color:var(--hv-line);border-left:4px solid var(--hv)}
.dpill.stunt{background:var(--hv);color:#000}
.dayhead{padding:12px 16px;background:var(--panel2);border-bottom:1px solid var(--line)}
.dh-top{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.ddate{font-family:var(--cond);font-weight:700;font-size:24px;letter-spacing:.04em;text-transform:uppercase;line-height:1;cursor:default}
.ddate .wd{color:var(--hv);margin-right:7px}
.daycard:not(.has-stunts) .ddate .wd{color:var(--sub)}
.dnum{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--sub);border:1px solid var(--line2);border-radius:5px;padding:2px 7px;letter-spacing:.05em}
.unitpill{font-size:9px;font-weight:800;letter-spacing:.12em;border-radius:5px;padding:3px 8px;text-transform:uppercase}
.unitpill.main{background:var(--hv);color:#000}
.unitpill.u2{background:none;border:1px dashed var(--hv-line);color:var(--hv)}
.dh-top .dloc{font-size:12.5px;font-weight:600;color:var(--sub)}
.dh-top .dmeta{font-size:10.5px;color:var(--faint);font-family:var(--mono)}
.dh-top .grow{flex:1}
.dpill{font-size:10px;font-weight:700;letter-spacing:.08em;border-radius:5px;padding:3px 9px;text-transform:uppercase}
.dpill.type{background:var(--panel);border:1px solid var(--line2);color:var(--sub)}
.dpill.sa{background:var(--crowd-dim);color:var(--crowd)}
.dh-cost{font-family:var(--mono);font-weight:600;font-size:16px;color:var(--money);font-variant-numeric:tabular-nums;background:none;border:none;padding:0;text-align:right}
.dh-cost:hover{text-decoration:underline}
.dh-cost small{font-size:9.5px;color:var(--faint);display:block;text-align:right;letter-spacing:.1em;text-transform:uppercase;font-family:var(--body)}
.dh-stunts{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;align-items:center}
.dh-stunts .sl{font-size:9px;font-weight:800;letter-spacing:.14em;color:var(--hv);text-transform:uppercase;margin-right:2px}
.teamcount{font-size:10px;font-weight:700;font-family:var(--mono);color:var(--sub);border:1px solid var(--line2);border-radius:20px;padding:2.5px 9px}
.teamcount b{color:var(--hv)}
.person{font-size:10.5px;font-weight:600;border-radius:20px;padding:2.5px 10px;background:var(--panel);border:1px solid var(--line2);color:var(--sub)}
.person b{color:var(--ink);font-family:var(--mono);font-weight:600;font-size:10px}
.person.sd{border-color:var(--hv-line);background:var(--hv-dim);color:var(--ink)}
.person.co{background:var(--hv);border-color:var(--hv);color:#000}
.person.co b{color:#000}
.person.xt{border-style:dashed;border-color:var(--hv-line);color:var(--ink)}
.person.dbl{border-color:#8a6a1f;background:var(--notebg);color:var(--note)}

.colhead,.strip{display:grid;grid-template-columns:5px 84px 46px 1fr 138px 158px 92px 34px}
.colhead{border-top:1px solid var(--line);background:var(--panel)}
.colhead div{padding:5px 10px;font-size:8.5px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
.colhead .c-stunt{color:var(--hv)}
.colhead .c-crowd{color:var(--crowd)}
.strip{border-top:1px solid var(--line);min-height:48px}
.strip>div{padding:9px 10px;display:flex;flex-direction:column;justify-content:center}
.strip .rail{padding:0}
.strip.tod-dayext .rail{background:var(--dayext)}
.strip.tod-dayint .rail{background:var(--dayint)}
.strip.tod-nightint .rail{background:var(--nightint)}
.strip.tod-nightext .rail{background:var(--nightext)}
.strip.tod-dusk .rail{background:var(--dusk)}
.strip.stunt-row{background:linear-gradient(90deg,var(--hv-dim),var(--hv-dim) 15%,transparent 55%)}
.strip .scn{font-family:var(--mono);font-size:12px;font-weight:600}
.strip .scn small{font-size:9px;color:var(--faint);font-weight:500}
.strip .ie{font-family:var(--cond);font-size:14px;font-weight:600;color:var(--sub);text-align:center}
.strip .ie small{display:block;font-size:9px;letter-spacing:.05em;color:var(--faint);font-family:var(--mono)}
.strip .body .slug{font-weight:600;font-size:12.5px}
.strip .body .desc{font-size:11.5px;color:var(--sub);margin-top:1px}
.strip .body .tags{margin-top:4px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tag{font-size:8.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;background:var(--panel2);border:1px solid var(--line);border-radius:4px;padding:1px 6px;color:var(--faint)}
.tag.strand{border-color:var(--hv-line);color:var(--hv)}
.ccol{border-left:1px solid var(--line);align-items:flex-start!important}
.codes{display:flex;gap:4px;flex-wrap:wrap}
.code{font-family:var(--mono);font-size:10px;font-weight:600;background:var(--panel2);border:1px solid var(--line2);color:var(--sub);border-radius:5px;padding:1px 6px;cursor:default}
.code.st{background:var(--hv-dim);border-color:var(--hv-line);color:var(--hv)}
.code.co{background:var(--hv);border-color:var(--hv);color:#000}
.code.dbl{background:var(--notebg);border-color:#8a6a1f;color:var(--note)}
.code.oc{opacity:.55}
.code.xt{font-family:var(--body);background:none;border-style:dashed;border-color:var(--hv-line);color:var(--ink)}
.code.cr{background:var(--crowd-dim);border-color:transparent;color:var(--crowd)}
.code.click,.dpill.click{cursor:pointer;border:1px dashed var(--crowd)!important}
.code.click:hover,.dpill.click:hover{background:var(--crowd);color:#fff}
.code.feat{background:var(--notebg);border-color:transparent;color:var(--note)}
.code.spact{background:rgba(183,138,255,.12);border-color:transparent;color:#b78aff}
.code.veh{background:none;border-color:var(--line2);color:var(--faint)}
.dash{color:var(--line2);font-size:12px}

/* notes */
.notebtn{background:none;border:none;color:var(--faint);font-size:14px;padding:6px;line-height:1}
.notebtn:hover{color:var(--note)}
.notebtn.has{color:var(--note)}
.notearea{grid-column:2/-1;padding:0 10px 9px 10px!important}
.notearea textarea{width:100%;background:var(--notebg);border:1px dashed #8a6a1f55;border-radius:7px;color:var(--note);
  font-family:var(--body);font-size:11.5px;padding:7px 10px;resize:vertical;min-height:34px}
.notearea textarea::placeholder{color:var(--faint)}
.daynote-row{padding:9px 14px;border-top:1px dashed var(--line)}
.adddaynote{background:none;border:1px dashed var(--line2);border-radius:7px;color:var(--faint);font-size:11px;font-weight:600;padding:6px 12px}
.adddaynote:hover{color:var(--note);border-color:#8a6a1f88}
.daynote-row textarea{width:100%;background:var(--notebg);border:1px dashed #8a6a1f55;border-radius:7px;color:var(--note);
  font-family:var(--body);font-size:11.5px;padding:8px 10px;resize:vertical;min-height:38px;margin-top:8px}
.adddaynote.has{color:var(--note);border-color:#8a6a1f88}
#cmBody tr.exp{cursor:pointer}
#cmBody tr.exp td:first-child::before{content:'▸';display:inline-block;margin-right:7px;color:var(--faint);transition:transform .12s}
#cmBody tr.exp.openrow td:first-child::before{transform:rotate(90deg);color:var(--hv)}
#cmBody tr.sub td{background:var(--panel2);color:var(--sub);font-size:11.5px;border-bottom:1px solid var(--line)}
#cmBody tr.sub td:first-child{padding-left:34px}
#cmBody tr.sub .fm{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
.tablecard>h3{cursor:pointer;user-select:none}
.tablecard>h3::before{content:'▾';display:inline-block;margin-right:9px;color:var(--faint);transition:transform .12s}
.tablecard.closed>h3::before{transform:rotate(-90deg)}
.tablecard.closed>.tscroll,.tablecard.closed>.note{display:none}
.tablecard tbody tr.wk-exp{cursor:pointer}
.tablecard tbody tr.wk-exp td:first-child::before{content:'▸';display:inline-block;margin-right:7px;color:var(--faint);transition:transform .12s}
.tablecard tbody tr.wk-exp.openrow td:first-child::before{transform:rotate(90deg);color:var(--hv)}
.tablecard tbody tr.wk-sub td{background:var(--panel2);color:var(--sub);font-size:11.5px}
.tablecard tbody tr.wk-sub td:first-child{padding-left:30px}

.cal-month{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
.cal-month h3{font-family:var(--cond);font-size:19px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:12px 16px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center}
.cal-month h3 .sum{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--money)}
.cal-head,.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-head div{padding:6px 8px;font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);border-bottom:1px solid var(--line);text-align:right}
.cal-cell{min-height:92px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px 7px;position:relative;background:var(--bg)}
.cal-cell .cloc{font-size:10px;font-weight:600;color:var(--ink);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.cal-cell .chrs{font-family:var(--mono);font-size:8.5px;color:var(--faint);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-cell .ctype{font-size:7.5px;font-weight:800;letter-spacing:.08em;border:1px solid var(--line2);color:var(--sub);border-radius:4px;padding:0 4px;margin-left:3px;vertical-align:1px}
.cal-cell.noshoot .dnumtxt{opacity:.4}
.cal-cell.shoot{background:var(--panel2);box-shadow:inset 0 0 0 1px var(--line2)}
.cal-grid .cal-cell:nth-child(7n){border-right:none}
.cal-cell .dnumtxt{position:absolute;top:5px;right:7px;font-family:var(--mono);font-size:10px;color:var(--faint)}
.cal-cell.off{background:var(--panel2);opacity:.45}
.cal-cell.shoot{cursor:pointer}
.cal-cell.shoot:hover{background:var(--hover)}
.cal-cell.stunt{background:var(--hv-dim);border-left:3px solid var(--hv)}
.cal-cell.dimmed{opacity:.28}
.cal-cell .cd{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--ink);border:1px solid var(--line2);border-radius:4px;padding:1px 5px;display:inline-block}
.cal-cell.stunt .cd{border-color:var(--hv-line);color:var(--hv)}
.cal-cell .u2tag{font-size:8px;font-weight:800;letter-spacing:.08em;border:1px dashed var(--hv-line);color:var(--hv);border-radius:4px;padding:0 4px;margin-left:3px}
.cal-cell .ccost{font-family:var(--mono);font-size:10px;color:var(--money);margin-top:5px}
.cal-cell .cteam{font-size:9px;color:var(--sub);margin-top:2px;line-height:1.3}
.cal-cell .adj{position:absolute;bottom:5px;right:7px;font-size:10px}
.calctl{display:flex;align-items:center;margin-bottom:12px}
.cal-cell .cchars{margin-top:4px}
.cal-cell .crow{font-size:9.5px;color:var(--sub);line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-cell .crow b{font-family:var(--mono);color:var(--crowd)}
.cal-cell .crow.xt b{color:#c9a44f}
.cal-cell .crow.ctot{border-top:1px solid var(--line);margin-top:3px;padding-top:2px;color:var(--ink);font-weight:700}
.cal-cell .crow.ctot b{color:var(--ink)}
.cal-legend{display:flex;gap:14px;padding:10px 16px;font-size:10.5px;color:var(--faint);border-top:1px solid var(--line);flex-wrap:wrap}
.cal-legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}
@media (max-width:640px){
  .cal-cell{min-height:62px;padding:4px 5px}
  .cal-cell .cteam{display:none}
  .cal-cell .chrs{display:none}
  .cal-cell .cloc{font-size:8.5px}
  .cal-cell .ccost{font-size:9px}
  .cal-cell .ctype{display:none}
}
.breakline{background:repeating-linear-gradient(-45deg,var(--panel),var(--panel) 12px,var(--panel2) 12px,var(--panel2) 24px);border:1px solid var(--line);border-radius:var(--r);padding:13px 16px;margin-bottom:14px;text-align:center;font-family:var(--cond);font-size:16px;letter-spacing:.18em;text-transform:uppercase;color:var(--sub)}

.tablecard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.tablecard h3{font-family:var(--cond);font-size:19px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.tablecard h3 .cnt{font-size:10.5px;background:var(--panel2);border:1px solid var(--line2);color:var(--sub);border-radius:20px;padding:2px 10px;font-family:var(--body);letter-spacing:0}
.tablecard h3 .sum{margin-left:auto;font-family:var(--mono);font-size:14px;color:var(--money);letter-spacing:0}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--faint);text-align:left;padding:9px 14px;border-bottom:1px solid var(--line);background:var(--panel2);font-weight:700;white-space:nowrap}
td{padding:9px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--hover)}
td.mono,th.mono{font-family:var(--mono);font-size:11.5px}
td.num,th.num{text-align:right;font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:12px}
td.money{color:var(--money);font-weight:600}
tr.total td{background:var(--panel2);font-weight:700;border-top:2px solid var(--line2)}
td .daylist{display:flex;gap:4px;flex-wrap:wrap}
.dchip{font-family:var(--mono);font-size:10px;background:var(--panel2);border:1px solid var(--line2);color:var(--sub);border-radius:5px;padding:1px 7px;cursor:pointer}
.dchip:hover{border-color:var(--hv);color:var(--hv)}
.dchip.u2{border-style:dashed}
.dchip.more{color:var(--hv);border-color:var(--hv-line);font-weight:700}
.morechips{display:contents}
.dl-mobile{display:none}
.drange{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line2);border-radius:9px;padding:8px 11px;cursor:pointer}
.ptable{table-layout:fixed;min-width:1120px}
.ptable td.rowlabel{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.datescol{min-width:250px}
.drange .rtxt{font-size:11.5px;white-space:nowrap}
.drange .rtxt b{font-family:var(--mono);font-weight:600}
.drange .rcnt{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--hv);border:1px solid var(--hv-line);border-radius:14px;padding:2px 9px;white-space:nowrap}
.dsheet{margin-top:7px;background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:9px 10px}
.dsheet h4{font-family:var(--cond);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--sub);margin:7px 0 4px;font-weight:600}
.dsheet h4:first-child{margin-top:0}
@media (max-width:640px){
  .dl-desktop{display:none}
  .dl-mobile{display:block;min-width:210px}
  .datescol{min-width:230px}
}
.rowlabel{font-weight:600}
.note{font-size:11.5px;color:var(--faint);padding:11px 16px;border-top:1px solid var(--line)}

/* cost popup — hidden by default, .open shows it */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:none;place-items:center;z-index:80}
.modal.open{display:grid}
.modal .box{background:var(--panel);border:1px solid var(--line2);border-radius:14px;max-width:660px;width:94%;max-height:84vh;overflow:auto}
.modal .mhead{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
.modal .mhead h3{font-family:var(--cond);font-size:21px;text-transform:uppercase;letter-spacing:.05em}
.modal .mhead .sub{color:var(--sub);font-size:12px}
.modal .mhead .x{margin-left:auto;background:var(--panel2);border:1px solid var(--line2);border-radius:7px;padding:5px 12px;font-weight:700}
.modal .mhead .x:hover{border-color:var(--hv);color:var(--hv)}
/* crowd day calculator */
#cdBody{padding:14px 18px}
.cdsec{margin-bottom:14px}
.cdsec .sl2{font-size:9.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);margin-bottom:7px}
.seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line2);border-radius:9px;overflow:hidden;margin-right:10px;vertical-align:middle}
.seg button{border:none;background:none;padding:8px 14px;font-size:12px;font-weight:600;color:var(--sub);border-right:1px solid var(--line2)}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--hv);color:#000}
.cdrow{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.cdfield label{display:block;font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:4px}
.cdfield input[type=time]{background:var(--panel2);border:1px solid var(--line2);border-radius:8px;color:var(--ink);padding:8px 10px;font-family:var(--mono);font-size:13px}
.cdinfo{font-size:11px;color:var(--sub);font-family:var(--mono)}
.cdinfo b{color:var(--hv)}
.cdflag{font-size:10px;font-weight:700;border-radius:14px;padding:3px 10px;border:1px solid var(--line2);color:var(--sub)}
.cdflag.on{background:var(--notebg);border-color:#8a6a1f88;color:var(--note)}
.chk2{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer}
.chk2 input{accent-color:var(--hv)}
#cdChars table input{background:var(--panel2);border:1px solid var(--line2);border-radius:7px;color:var(--ink);padding:6px 9px;font-size:12px;font-family:inherit;width:100%}
#cdChars input.cnt2{width:64px;font-family:var(--mono);text-align:right}
#cdChars select{background:var(--panel2);border:1px solid var(--line2);border-radius:7px;color:var(--ink);padding:6px 9px;font-size:12px}
#cdChars .del{background:none;border:none;color:var(--faint);font-size:14px;padding:4px 8px}
#cdChars .del:hover{color:#ff6b6b}
.cdtotal{display:flex;align-items:center;gap:14px;padding:12px 0 2px;border-top:2px solid var(--line2);margin-top:10px}
.cdtotal .n{font-family:var(--mono);font-size:20px;color:var(--money);font-weight:600;margin-left:auto}
.reconcile{font-size:11px;font-weight:600;border-radius:7px;padding:6px 11px;display:inline-block;margin-top:8px}
.reconcile.ok{background:rgba(76,195,138,.12);color:#4cc38a}
.reconcile.warn{background:var(--notebg);color:var(--note)}
td.dim{color:var(--line2)}
.supgrid{display:flex;flex-direction:column;gap:7px}
.supgrid .chk2{display:flex;font-size:11.5px}
.fcgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
.fccol{display:flex;flex-direction:column;gap:12px}
.fcpad{padding:14px 16px}
.fcpad .sl2{font-size:9.5px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--sub);margin-bottom:9px}
.fctiles{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.fcrow{display:flex;justify-content:space-between;gap:14px;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.fcrow .fnote{font-size:10.5px;color:var(--faint);margin-top:2px}
.fcrow .famt{font-family:var(--mono);font-size:13px}
.fcrow.strong{border-bottom:2px solid var(--line2)}
.fcrow.strong .famt{font-size:16px;color:var(--money);font-weight:600}
.fcgross{margin-top:12px;background:var(--panel2);border:1px solid var(--hv-line);border-radius:10px;padding:12px 14px}
.grossline{display:flex;gap:10px;align-items:baseline;font-size:13px}
.grossline input{width:70px;background:var(--bg);border:1px solid var(--line2);border-radius:7px;color:var(--ink);padding:7px 9px;font-family:var(--mono);font-size:13px}
.grossline b{font-family:var(--mono);font-size:20px;margin-left:auto}
@media (max-width:920px){.fcgrid{grid-template-columns:1fr}}
.dslider{position:relative;height:46px;flex:1;min-width:280px;max-width:640px}
.dslider .track{position:absolute;left:0;right:0;top:16px;height:6px;border-radius:3px;background:var(--panel2);border:1px solid var(--line2)}
.dslider .fill{position:absolute;top:17px;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--hv),#8b5cf6)}
.dslider input[type=range]{position:absolute;left:0;top:8px;width:100%;-webkit-appearance:none;appearance:none;background:none;pointer-events:none;height:22px;margin:0}
.dslider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:var(--bg);border:3px solid var(--hv);pointer-events:auto;cursor:grab}
.dslider input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--bg);border:3px solid var(--hv);pointer-events:auto;cursor:grab}
.dslider .ticks{position:absolute;top:32px;left:0;right:0;height:12px}
.dslider .ticks span{position:absolute;transform:translateX(-50%);font-family:var(--mono);font-size:8.5px;color:var(--faint)}
.loclink{color:inherit;text-decoration:none;border-bottom:1px dashed var(--line2)}
.loclink:hover{color:var(--hv);border-bottom-color:var(--hv)}
.bandchip{font-family:var(--mono);font-size:9px;font-weight:800;border:1px solid var(--line2);border-radius:4px;padding:1px 5px;color:var(--sub);cursor:default}
.bandchip.b{border-style:dashed;color:var(--hv);border-color:var(--hv-line)}
tr.cdopen{cursor:pointer}
tr.cdopen:hover td{background:var(--hv-dim)!important}
tr.cdopen.openrow td{background:var(--hv-dim)!important}
tr.cdexp>td{padding:0!important;background:var(--panel2)}
tr.cdexp:hover td{background:var(--panel2)!important}
.cdwrap{padding:16px 18px;border-left:3px solid var(--hv)}
#calBody{padding:0}
#calBody .cald{padding:14px 18px;border-bottom:1px solid var(--line)}
#calBody .cald:last-child{border-bottom:none}
#calBody .meta{font-size:12px;color:var(--sub);margin-bottom:8px}
#calBody .meta b{color:var(--ink)}
#calBody .scline{display:flex;gap:8px;align-items:stretch;padding:5px 0;font-size:12px;border-top:1px solid var(--line)}
#calBody .scline:first-of-type{border-top:none}
#calBody .scline .rail2{width:4px;border-radius:2px;flex:none}
#calBody .scline.tod-dayext .rail2{background:var(--dayext)}
#calBody .scline.tod-dayint .rail2{background:var(--dayint)}
#calBody .scline.tod-nightint .rail2{background:var(--nightint)}
#calBody .scline.tod-nightext .rail2{background:var(--nightext)}
#calBody .scline.tod-dusk .rail2{background:var(--dusk)}
#calBody .scline .scmain{flex:1;min-width:0}
#calBody .scline.st{background:linear-gradient(90deg,var(--hv-dim),transparent 60%)}
#calBody .scline .scnum{font-family:var(--mono);font-size:11px;color:var(--sub);min-width:64px}
#calBody .scline.st .scnum{color:var(--hv);font-weight:700}
#calBody .scline .sl{color:var(--ink)}
#calBody .chiprow{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}
#calBody .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
#calBody .actions button{border:1px solid var(--line2);background:var(--panel2);border-radius:8px;padding:8px 13px;font-weight:600;font-size:12px}
#calBody .actions button:hover{border-color:var(--hv);color:var(--hv)}
#calBody .actions button.primary{background:var(--hv);color:#000;border-color:var(--hv)}
#calBody .dnote{background:var(--notebg);border:1px dashed #8a6a1f55;border-radius:7px;color:var(--note);font-size:11.5px;padding:7px 10px;margin-top:8px}
.adjform{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--line);flex-wrap:wrap}
.adjform input{background:var(--panel2);border:1px solid var(--line2);border-radius:8px;color:var(--ink);padding:8px 10px;font-size:12px;font-family:inherit}
.adjform #adjLabel{flex:1;min-width:200px}
.adjform #adjAmt{width:110px;font-family:var(--mono)}
.adjform button{background:var(--hv);color:#000;border:none;border-radius:8px;padding:8px 14px;font-weight:700;font-size:12px}
tr.adjrow td{background:rgba(232,194,104,.05)}

.raOverlay{position:fixed;inset:0;background:#e9e9ea;z-index:70;overflow:auto;display:none}
.raOverlay.open{display:block}
.raTop{position:sticky;top:0;background:#fff;border-bottom:1px solid #ccc;padding:10px 20px;display:flex;gap:12px;align-items:center;z-index:2}
.raTop button{border:1px solid #ccc;background:#f5f5f5;border-radius:7px;padding:8px 14px;font-weight:700;font-size:12.5px;color:#222;font-family:Inter,sans-serif}
.raTop button:hover{border-color:#999}
.raTop button.primary{background:#171b21;color:#fff;border-color:#171b21}
.raDoc{max-width:820px;margin:24px auto 60px;background:#fff;color:#111;padding:26px 30px;font-family:Arial,Helvetica,sans-serif;font-size:12px;border:1px solid #999;box-shadow:0 4px 24px rgba(0,0,0,.12)}
.raDoc h1{font-family:Arial,Helvetica,sans-serif;font-size:21px;font-weight:800;letter-spacing:.01em;border:2px solid #111;padding:7px 12px;display:inline-block;margin-bottom:14px}
.raDoc .ranum{float:right;font-weight:800;font-size:15px;margin-top:6px}
.raLbl{background:#eaeaea;font-weight:800;font-size:9.5px;text-transform:uppercase;letter-spacing:.03em}
.raRow{display:grid;border:1px solid #111;border-top:none}
.raRow.cols3{grid-template-columns:1fr 1fr 1.4fr}
.raRow.cols4{grid-template-columns:1fr 1fr 1fr 1fr}
.raRow>div{border-right:1px solid #111;padding:5px 8px}
.raRow>div:last-child{border-right:none}
.raBlock{border:1px solid #111;border-top:none}
.raBlockHead{background:#111;color:#fff;font-weight:800;padding:5px 10px;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em}
.raBlockBody{padding:8px 10px;white-space:pre-wrap;line-height:1.5}
.raSceneHead{background:#d8d8d8;font-weight:800;padding:6px 10px;border:1px solid #111;border-top:18px solid #fff;font-size:11.5px}
.raHazTable{display:grid;grid-template-columns:1fr 1fr;border:1px solid #111;border-top:none}
.raHazTable>div{border-right:1px solid #111;padding:8px}
.raHazTable>div:last-child{border-right:none}
.raHazTable .htitle{font-weight:800;font-size:11px;text-transform:uppercase}
.raHazTable .hsub{font-size:9.5px;color:#555;display:block;margin:2px 0 6px;text-transform:none;font-weight:400}
.raHazTable textarea{width:100%;border:1px dashed #bbb;border-radius:4px;font-family:Arial,Helvetica,sans-serif;font-size:11.5px;min-height:140px;resize:vertical;padding:6px;line-height:1.45}
.raFoot{margin-top:16px;text-align:center;color:#a30000;font-size:10.5px;font-weight:700;line-height:1.5}
.raInput{border:none;border-bottom:1px dashed #999;width:100%;font-family:Arial,Helvetica,sans-serif;font-size:12px;padding:2px 0;background:none}
@media print{
  body *{visibility:hidden}
  .raOverlay, .raOverlay *{visibility:visible}
  .raOverlay{position:absolute;inset:auto;top:0;left:0;background:#fff;overflow:visible}
  .noprint{display:none!important}
  .raDoc{border:none;margin:0;max-width:none;box-shadow:none}
  .raHazTable textarea{border:none;padding:0}
}

@media (max-width:920px){
  .colhead{display:none}
  .strip{grid-template-columns:5px 78px 1fr 40px}
  .strip .ie{display:none}
  .ccol{grid-column:2/-1;border-left:none;border-top:1px dashed var(--line);flex-direction:row!important;gap:8px;align-items:center!important;flex-wrap:wrap}
  .summary{grid-template-columns:1fr 1fr}
  .stat.hero{grid-column:1/-1}
  .controls{position:static}
  .notebtn{font-size:17px;padding:10px}
}
@media (max-width:640px){
  body{font-size:13px}
  .wrap{padding:12px}
  .topbar{padding:8px 12px;gap:8px}
  .brand small{display:none}
  .brand{font-size:19px}
  .srcbar{order:5;width:100%;overflow-x:auto}
  .srcbar button{padding:9px 12px;white-space:nowrap;flex:1;justify-content:center}
  #status{display:none}
  .tb-btn{padding:8px 11px;font-size:12px}
  .summary{gap:7px}
  .stat{padding:11px 12px}
  .stat .n{font-size:26px}
  .stat.hero .n{font-size:32px}
  .tabs{width:100%;overflow-x:auto}
  .tabs button{flex:1;padding:10px 8px;white-space:nowrap}
  .searchwrap{width:100%}
  .searchwrap input{width:100%;flex:1;padding:11px 12px}
  .chk{flex:1;justify-content:center;padding:10px 8px}
  .legend{display:none}
  .dh-top{gap:8px}
  .ddate{font-size:20px}
  .dh-top .dmeta{display:none}
  .dh-cost{font-size:14px}
  .dpill{font-size:9px;padding:3px 7px}
  .person{font-size:10px;padding:3px 9px}
  th,td{padding:8px 9px}
  table{font-size:11.5px}
  .modal .box{width:97%;max-height:90vh}
  .adjform #adjLabel{min-width:140px}
  .raTop{flex-wrap:wrap;padding:8px 12px}
  .raTop span{display:none}
  .raDoc{padding:14px;margin:10px auto 30px}
  .raDoc h1{font-size:15px;padding:6px 8px}
  .raRow.cols3,.raRow.cols4{grid-template-columns:1fr 1fr}
  .raHazTable{grid-template-columns:1fr}
  .raHazTable>div{border-right:none;border-bottom:1px solid #111}
  .raHazTable>div:last-child{border-bottom:none}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="mark" id="brandMark">S</span><span><span id="brandName">Stunt<em>OS</em></span><small>Schedule · Breakdown · Cost</small></span></div>
  <div class="srcbar" id="modeBar">
    <button data-appmode="stunt" class="on">StuntOS</button>
    <button data-appmode="crowd">CrowdOS</button>
  </div>
  <div class="srcbar" id="srcBar"></div>
  <button class="tb-btn" id="btnAdd">+ Add schedule</button>
  <span class="colourpill" id="colourPill"></span>
  <div class="grow"></div>
  <button class="tb-btn" id="btnMode" data-tip="Light / dark">◐</button>
  <span id="status" role="status"></span>
  <input type="file" id="fileInput" accept="application/pdf" style="display:none">
</div>

<div id="boardView" class="wrap">
  <div class="summary" id="summary"></div>

  <details class="ratesbar" id="ratesBar">
    <summary><span class="dot"></span> Stunt rate card <span class="hint" id="ratesHint"></span></summary>
    <div class="rates-grid">
      <div class="rfield"><label>Performer day rate</label><div class="inwrap"><span>£</span><input id="rPerf" type="number" step="0.5" value="600"></div></div>
      <div class="rfield"><label>Holiday pay / day</label><div class="inwrap"><span>£</span><input id="rHol" type="number" step="0.5" value="17.50"></div></div>
      <div class="rfield"><label>Insurance / day</label><div class="inwrap"><span>£</span><input id="rIns" type="number" step="0.5" value="17.50"></div></div>
      <div class="rfield"><label>Insured days / week</label><div class="inwrap"><span>×</span><input id="rInsDays" type="number" step="1" min="0" value="2"></div></div>
      <div class="rfield"><label>Usage (% of day rate)</label><div class="inwrap"><span>%</span><input id="rUse" type="number" step="0.5" value="55.5"></div></div>
      <div class="rfield"><label>Coordinator day rate</label><div class="inwrap"><span>£</span><input id="rCoord" type="number" step="0.5" value="1000"></div></div>
      <div class="rfield"><label>Stunt dept coordinator (day rate)</label><div class="inwrap"><span>£</span><input id="rSDRate" type="number" step="0.5" value="350"></div></div>
      <div class="rfield"><label>Stunt dept coordinator days/wk</label><div class="inwrap"><span>×</span><input id="rSDDays" type="number" step="1" min="0" value="4"></div></div>
      <div class="rfield" style="display:flex;align-items:flex-end"><label class="chk" style="width:100%;justify-content:center"><input type="checkbox" id="rSDOn"> Include stunt dept coordinator</label></div>
      <div class="rates-note" id="ratesCalc"></div>
    </div>
  </details>

  <details class="ratesbar hidden" id="crowdRatesBar">
    <summary><span class="dot"></span> Crowd rate card <span class="hint" id="cratesHint"></span></summary>
    <div class="rates-grid">
      <div class="rfield"><label>SA basic daily rate</label><div class="inwrap"><span>£</span><input id="cSA" type="number" step="0.01" value="111.21"></div></div>
      <div class="rfield"><label>Holiday pay %</label><div class="inwrap"><span>%</span><input id="cHol" type="number" step="0.01" value="12.07"></div></div>

<script>
// ---- One-Line Schedule parser (Piccadilly-style conventions) ----
const RX = {
  day: /^-{1,}\s*Day\s+(\d+)\s*-\s*(.+?)\s*-{2,}\s*SR\s*([\d:]+)\s*\/\s*SS\s*([\d:]+)/i,
  endDay: /^-{2,}\s*End of Day\s+(\d+)\s*-{2,}\s*(.+?)\s*-{2,}\s*([\d\s\/]+)\s*Pages?/i,
  loc: /^-{2,}\s*(.+?)\s*-{1,}\s*(\d{3,4})\s*-\s*(\d{3,4})\s*(?:-{2,}\s*(CWD|CWN|SCWD))?/,
  scene: /^(\d+\/\d+[A-Z]?)\s*(?:Pt\s*(\d\s*\/\s*\d)|(\d\/\d))?\s+(INT|EXT|I\/E)\s+(.+)$/,
  detail: /^(.*?)\s+(Day|Night|Dawn|Dusk|Dusk\/Night)\s+([A-Z0-9]+)\s+((?:\d+\s+)?(?:\d\/8)?)\s*pgs\.\s*(.*)$/,
  unit: /^[-=\s]*((?:Splinter|CCTV|Stills|2nd)\s*Unit)[-=\s]*$/i,
  cameras: /^-{2,}\s*(\d)\s*Cameras\s*-{2,}$/i,
  hiatus: /HIATUS/i,
  rest: /Rest Day/i,
  sa: /SA'?s:\s*(\d+)/i,
  veh: /(Pod\s+)?Veh:\s*(\d+)/i,
  castCode: /^(?:\d+(?:sd|cd|dd|oc|d)?|st\d+|ST\d*)$/i,
  tagLine: /^(Move(?:\s+(?:Set|Downstairs|Upstairs))?|Set Move|Trolley Push\??|Drone(?:\s+U\s*Crane)?|U Crane|Array|Low Loader|Pod|Green Screen|Travel (?:To|From) .+)$/i,
};

function classifyToken(t) {
  const tok = t.trim();
  if (!tok) return null;
  if (/^ST$/i.test(tok)) return { code: 'ST', type: 'stuntCoord' };
  if (/^st\d+$/i.test(tok)) return { code: tok.toLowerCase(), type: 'stuntPerf' };
  if (/^\d+sd$/i.test(tok)) return { code: tok.toLowerCase(), type: 'stuntDbl' };
  if (/^\d+(cd|dd|d)$/i.test(tok)) return { code: tok.toLowerCase(), type: 'double' };
  if (/^\d+oc$/i.test(tok)) return { code: tok.toLowerCase(), type: 'offCam' };
  if (/^\d+$/.test(tok)) return { code: tok, type: 'cast' };
  return null;
}

function parseCastList(lines) {
  const map = {};
  const codeRx = /(\d+(?:sd|cd|dd|oc|d)?|st\d+|ST\d*)\.\s*([^]+?)(?=\s+(?:\d+(?:sd|cd|dd|oc|d)?|st\d+|ST\d*)\.|\s*$)/g;
  let inCast = false;
  for (const ln of lines) {
    if (/^CAST MEMBERS/i.test(ln)) { inCast = true; continue; }
    if (inCast && /^==/.test(ln)) break;
    if (!inCast) continue;
    let m;
    while ((m = codeRx.exec(ln)) !== null) {
      const code = m[1];
      const name = m[2].trim().replace(/\s{2,}/g, ' ');
      if (name) map[code] = name;
    }
  }
  return map;
}

function parseSchedule(text) {
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean)
    .filter(l => !/^TILLY KENNINGTON/i.test(l) && !/^Registered Address/i.test(l) && !/^\*+CONFIDENTIAL\*+$/i.test(l) && !/^={3,}$/.test(l) && !/^\*{3,}$/.test(l) && l !== 'rd');

  const castMap = parseCastList(lines);
  const days = [];
  const notes = [];
  let day = null, scene = null, unit = 'Main';
  let pendingCastWrap = false;

  const pushScene = () => { if (scene && day) day.scenes.push(scene); scene = null; };

  for (let i = 0; i < lines.length; i++) {
    const ln = lines[i];
    let m;

    if ((m = ln.match(RX.day))) {
      pushScene();
      if (day) days.push(day);
      day = { num: +m[1], date: m[2].trim().replace(/-+$/, '').trim(), sr: m[3], ss: m[4], loc: '', hours: '', type: '', cams: '', scenes: [], pages: '' };
      unit = 'Main';
      continue;
    }
    if ((m = ln.match(RX.endDay))) {
      pushScene();
      if (day) { day.pages = m[3].trim(); days.push(day); day = null; }
      continue;
    }
    if (day && !day.loc && (m = ln.match(RX.loc))) {
      day.loc = m[1].replace(/-+$/, '').trim();
      day.hours = m[2] + '–' + m[3];
      day.type = m[4] || '';
      continue;
    }
    if (day && (m = ln.match(RX.cameras))) { day.cams = m[1]; continue; }
    if ((m = ln.match(RX.unit))) { pushScene(); unit = m[1].replace(/\s+/g, ' '); continue; }
    if (RX.hiatus.test(ln)) { notes.push({ type: 'hiatus', text: ln.replace(/\*/g, '').trim(), afterDay: day ? day.num : (days.length ? days[days.length - 1].num : null) }); continue; }
    if (RX.rest.test(ln)) { notes.push({ type: 'rest', text: ln.replace(/[=\-]/g, '').trim(), afterDay: days.length ? days[days.length - 1].num : null }); continue; }

    if (day && (m = ln.match(RX.scene))) {
      pushScene();
      const slugRest = m[5];
      const d = slugRest.match(RX.detail);
      scene = { num: m[1], part: (m[2] || m[3] || '').replace(/\s/g, ''), ie: m[4], unit, tags: [], desc: '', sa: 0, veh: 0, pod: false, cast: [], pages: '', tod: '', scriptDay: '' };
      if (d) {
        scene.slug = d[1].trim();
        scene.tod = d[2]; scene.scriptDay = d[3];
        scene.pages = (d[4] || '').trim().replace(/\s+/g, ' ');
        let rest = d[5] || '';
        const saM = rest.match(RX.sa); if (saM) scene.sa = +saM[1];
        const vM = rest.match(RX.veh); if (vM) { scene.veh = +vM[2]; scene.pod = !!vM[1]; }
        rest = rest.replace(RX.sa, '').replace(RX.veh, '');
        const toks = rest.split(',').map(s => s.trim()).filter(Boolean);
        pendingCastWrap = /,\s*$/.test(d[5].replace(RX.sa, '').replace(RX.veh, '').trim() + ' ') || /,\s*(SA'?s:|Pod|Veh:)/i.test(d[5]);
        // simpler: mark wrap if the token list (pre-SA) ended with a comma
        const pre = d[5].split(/SA'?s:|Pod\s+Veh:|Veh:/)[0];
        pendingCastWrap = /,\s*$/.test(pre);
        for (const t of toks) { const c = classifyToken(t); if (c) scene.cast.push(c); }
      } else {
        scene.slug = slugRest.trim();
      }
      continue;
    }

    if (scene && (m = ln.match(RX.tagLine))) { scene.tags.push(ln); continue; }
    if (day && !scene && (m = ln.match(RX.tagLine))) { continue; }

    // description line (may carry wrapped cast tokens at its tail)
    if (scene && !scene.desc) {
      let desc = ln;
      if (pendingCastWrap) {
        const tail = desc.match(/((?:\s*,?\s*(?:\d+(?:sd|cd|dd|oc|d)?|st\d+|ST\d*))+)\s*$/);
        if (tail) {
          const toks = tail[1].split(',').map(s => s.trim()).filter(Boolean);
          if (toks.every(t => RX.castCode.test(t))) {
            for (const t of toks) { const c = classifyToken(t); if (c) scene.cast.push(c); }
            desc = desc.slice(0, tail.index).replace(/[,\s]+$/, '');
          }
        }
        pendingCastWrap = false;
      }
      scene.desc = desc;
      continue;
    }
    // stray continuation of cast tokens on their own line
    if (scene) {
      const toks = ln.split(',').map(s => s.trim()).filter(Boolean);
      if (toks.length && toks.every(t => RX.castCode.test(t))) {
        for (const t of toks) { const c = classifyToken(t); if (c) scene.cast.push(c); }
        continue;
      }
    }
  }
  pushScene();
  if (day) days.push(day);
  return { days, castMap, notes };
}



// ---- Expanded / Full Fat schedule parser ----
const CATEGORIES = new Set(['Cast Members','Background Actors','Featured Background Actors','Stunt Performers','Spacts','Pod Cars','Vehicles','Props','Camera','Grips','Drone','Armourer','Special Effects','Wardrobe','Art Department','Makeup/Hair','Screens','Notes','Home Economist','Visual Effects','Special Equipment','Photos / Images','Animals','Additional Labor','Livestock','Security','Set Dressing','Costumes','Sound','Music','Mechanical Effects','Greenery','Electric','Miscellaneous','Optical FX','Painting','Construction','Special FX','Video','Communications','Stand Ins']);
const SKIP_RX = /^(TILLY KENNINGTON|Registered Address|PICCADILLY \/\/|Printed on |\(Continued on next page\)|'CLOWN TOWN'|\*\*2ND UNIT\*\*|2U Director|Schedule Issued|Script Versions|rd$|\d{2}-[A-Za-z]{3}-\d{4}$|\*+CONFIDENTIAL)/i;
const TAG_RX = /^(-{0,2}\s*)?(Move(?:\s+(?:Set|Downstairs|Upstairs))?|Set Move|Trolley Push\??|U Crane|Array|Low Loader|Pod|Green Screen|LOCATION MOVE|Travel (?:To|From) .+?)(\s*-{0,2})?$/i;
const OL_DAY_RX = /^-{1,}\s*Day\s+(\d+)\s*-\s*(.+?)\s*-{2,}\s*SR\s*([\d:]+)\s*\/\s*SS\s*([\d:]+)/i;
const OL_LOC_RX = /^-{2,}\s*(.+?)\s*-{1,}\s*(\d{3,4})\s*-\s*(\d{3,4})\s*(?:-{2,}\s*(CWD|CWN|SCWD))?/;
const OL_CAM_RX = /^-{2,}\s*(\d)\s*Cameras\s*-{2,}$/i;

function parenCount(str){ const m=str.match(/\((\d+)\)\s*$/); return m?{name:str.replace(/\s*\(\d+\)\s*$/,'').trim(),count:+m[1]}:{name:str.trim(),count:1}; }

function parseExpanded(text){
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean).filter(l=>!SKIP_RX.test(l));
  const days=[]; const notes=[]; const castMap={};
  let day=null, scene=null, block=null, strand='', pendingMeta=null, pendingSection='', seenDays=new Set(), skipDupe=false;

  const pushScene=()=>{ if(scene&&day)day.scenes.push(scene); scene=null; block=null; };

  for(const ln of lines){
    let m;
    // duplicate-document guard (2nd unit PDF repeats itself)
    if(skipDupe){
      if(/^End Day #/i.test(ln)) skipDupe=false;
      continue;
    }
    // one-liner style meta that precedes Shoot Day # in the main expanded doc
    if((m=ln.match(OL_DAY_RX))){ pendingMeta={sr:m[3],ss:m[4]}; continue; }
    if(pendingMeta&&!pendingMeta.loc&&(m=ln.match(OL_LOC_RX))){ pendingMeta.loc=m[1].replace(/-+$/,'').trim(); pendingMeta.hours=m[2]+'–'+m[3]; pendingMeta.type=m[4]||''; continue; }
    if(pendingMeta&&(m=ln.match(OL_CAM_RX))){ pendingMeta.cams=m[1]; continue; }

    if((m=ln.match(/^Shoot Day #\s*(\d+)\s+(.+)$/i))){
      pushScene();
      const num=+m[1];
      if(seenDays.has(num)){ skipDupe=true; if(day){days.push(day);day=null;} continue; }
      seenDays.add(num);
      if(day)days.push(day);
      day={num,date:m[2].trim(),sr:pendingMeta?.sr||'',ss:pendingMeta?.ss||'',loc:pendingMeta?.loc||pendingSection||'',hours:pendingMeta?.hours||'',type:pendingMeta?.type||'',cams:pendingMeta?.cams||'',scenes:[],pages:''};
      pendingMeta=null;
      continue;
    }
    if((m=ln.match(/^End Day #\s*(\d+)\s+.+?--\s*Total Pages:\s*(.+)$/i))){
      pushScene();
      if(day){ day.pages=m[2].trim(); days.push(day); day=null; }
      continue;
    }
    if((m=ln.match(/^==\s*(.+?)\s*==$/))){
      pendingSection=m[1].trim();
      if(day&&!day.loc)day.loc=pendingSection;
      if(!day&&/HIATUS|Rest Day/i.test(m[1]))notes.push({type:'note',text:m[1],afterDay:days.length?days[days.length-1].num:null});
      continue;
    }
    if(/^Chase #|^Sequence/i.test(ln)){ strand=ln.replace(/\s*Cont'd\.?$/i,'').trim(); continue; }

    if((m=ln.match(/^Scene\s*#?\s*(\d+\/\d+[A-Za-z]?)\s*(?:Pt\s*(\d\s*\/\s*\d)|(\d\/\d)|(pt))?\s+(INT|EXT|I\/E)\s+(.+?)\s*pgs\.\s*$/i))){
      pushScene();
      let body=m[6].trim(), tod='', scriptDay='', pages='';
      const tm=body.match(/\s+(Day|Night|Dawn|Dusk)(?:\s+([A-Z0-9]+))?(?:\s+((?:\d+\s+)?\d\/8|\d+))?$/i);
      if(tm){ tod=tm[1]; scriptDay=tm[2]||''; pages=(tm[3]||'').trim(); body=body.slice(0,tm.index).trim(); }
      scene={num:m[1],part:(m[2]||m[3]||'').replace(/\s/g,'')||(m[4]?'pt':''),ie:m[5].toUpperCase(),slug:body,tod,scriptDay,pages,
        unit:'Main',desc:'',sa:0,veh:0,pod:false,podVeh:0,cast:[],extras:[],spacts:[],featured:[],vehNames:[],tags:strand?[strand]:[]};
      block=null;
      continue;
    }
    if(scene&&TAG_RX.test(ln)){ scene.tags.push(ln.replace(/^-+\s*|\s*-+$/g,'')); continue; }
    if(!scene&&day&&TAG_RX.test(ln)) continue;

    if(CATEGORIES.has(ln)){ block=ln; continue; }

    if(scene&&!scene.desc&&!block){ scene.desc=ln; continue; }
    if(!scene||!block) continue;

    // block content
    if(block==='Cast Members'){
      const cm=ln.match(/^(\d+(?:sd|cd|dd|oc|d)?|st\d+|ST\d*|ST)\.\s*(.+)$/i);
      if(cm){ const tok=classifyToken(cm[1]); if(tok){ scene.cast.push(tok); if(cm[2])castMap[tok.code]=castMap[tok.code]||cm[2].trim(); } }
      continue;
    }
    if(block==='Background Actors'){
      const bm=ln.match(/^(\d+)\s*[xX]\s*C$/);
      if(bm){ scene.sa=Math.max(scene.sa,+bm[1]); }
      else if((m=ln.match(/^Crowd\s*\((\d+)\)$/i))){ scene.sa=Math.max(scene.sa,+m[1]); }
      else scene.featured.push(parenCount(ln));
      continue;
    }
    if(block==='Featured Background Actors'){ scene.featured.push(parenCount(ln)); continue; }
    if(block==='Stunt Performers'){ scene.extras.push(parenCount(ln)); continue; }
    if(block==='Spacts'){ scene.spacts.push(parenCount(ln)); continue; }
    if(block==='Pod Cars'){ scene.pod=true; scene.podVeh+=parenCount(ln).count; continue; }
    if(block==='Vehicles'){ const v=parenCount(ln); scene.veh+=v.count; scene.vehNames.push(ln); continue; }
    // other categories ignored
  }
  pushScene();
  if(day)days.push(day);
  return {days,castMap,notes};
}

function parseAny(text){
  if(/^Shoot Day #/m.test(text)) return parseExpanded(text);
  return parseSchedule(text);
}



</script>

// floating tooltip — never clipped by card overflow, clamps to viewport
const tipbox=document.createElement('div');tipbox.id='tipbox';document.body.appendChild(tipbox);
let TIP_EL=null;
function positionTip(el){
  const t=el.getAttribute('data-tip');
  if(!t){tipbox.style.display='none';return}
  tipbox.textContent=t;tipbox.style.display='block';
  const r=el.getBoundingClientRect();
  const tw=tipbox.offsetWidth, th=tipbox.offsetHeight;
  let left=r.left+r.width/2-tw/2;
  left=Math.max(8,Math.min(left,window.innerWidth-tw-8));
  let top=r.bottom+8;
  if(top+th>window.innerHeight-8)top=r.top-th-8;
  tipbox.style.left=left+'px';tipbox.style.top=Math.max(8,top)+'px';
}
document.addEventListener('mouseover',e=>{
  const el=e.target.closest&&e.target.closest('[data-tip]');
  if(el){TIP_EL=el;positionTip(el)}
  else if(TIP_EL){TIP_EL=null;tipbox.style.display='none'}
});
document.addEventListener('focusin',e=>{const el=e.target.closest&&e.target.closest('[data-tip]');if(el){TIP_EL=el;positionTip(el)}});

function detectColour(title,text){

  for(const c of Object.keys(THEMES)){ if(new RegExp('\\b'+c.toUpperCase()+'\\b').test(hay)) return c; }

}
function hexRgba(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}
function applyTheme(colour){
  const [hv,hv2]=THEMES[colour]||THEMES.white;
  const r=document.documentElement.style;
  r.setProperty('--hv',hv);r.setProperty('--hv2',hv2);
  r.setProperty('--hv-dim',hexRgba(hv,.24));r.setProperty('--hv-line',hexRgba(hv,.58));
  $('#colourPill').textContent=colour==='white'?'':colour+' schedule';

}

function todClass(s){
  const t=(s.tod||'').toLowerCase(), ie=s.ie;
  if(t==='dawn'||t==='dusk')return'tod-dusk';
  const night=t.startsWith('night');
  if(ie==='INT')return night?'tod-nightint':'tod-dayint';
  return night?'tod-nightext':'tod-dayext';
}
const isPerf=c=>c.type==='stuntPerf'||c.type==='stuntDbl';
const isStuntTok=c=>c.type==='stuntCoord'||isPerf(c);
const sceneHasStunts=s=>s.cast.some(isStuntTok)||(s.extras&&s.extras.length>0);
function personName(code){const n=MODEL.castMap[code]||MODEL.castMap[String(code).toUpperCase()]||MODEL.castMap[String(code).toLowerCase()]||code;return String(n).replace(/STUNT ARRANGER/ig,'STUNT COORDINATOR')}
function codeClass(c){return c.type==='stuntCoord'?'co':isPerf(c)?'st':c.type==='double'?'dbl':c.type==='offCam'?'oc':''}
function dayPeakSA(d){return Math.max(0,...d.scenes.map(s=>s.sa),0)}
function dayPeakFeat(d){return Math.max(0,...d.scenes.map(s=>(s.featured||[]).reduce((a,f)=>a+f.count,0)),0)}
function dayPeakSpact(d){return Math.max(0,...d.scenes.map(s=>(s.spacts||[]).reduce((a,f)=>a+f.count,0)),0)}

// ---------- dates ----------
const MONTHS={january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,september:8,october:9,november:10,december:11};
function parseDayDate(d){
  let m=d.date.match(/(\d{1,2})(?:st|nd|rd|th)?\s+([A-Za-z]+)(?:\s+(\d{4}))?/);
  if(m&&MONTHS[m[2].toLowerCase()]!=null)return new Date(+(m[3]||2026),MONTHS[m[2].toLowerCase()],+m[1]);
  m=d.date.match(/([A-Za-z]+)\s+(\d{1,2}),?\s*(\d{4})?/);
  if(m&&MONTHS[m[1].toLowerCase()]!=null)return new Date(+(m[3]||2026),MONTHS[m[1].toLowerCase()],+m[2]);
  return null;
}
function weekKey(date){const d=new Date(date);const wd=(d.getDay()+6)%7;d.setDate(d.getDate()-wd);return d.toISOString().slice(0,10)}
function fmtWeek(k){const d=new Date(k);return 'w/c '+d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
const WD=['SUN','MON','TUE','WED','THU','FRI','SAT'],MO=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function fmtDayDate(d){
  if(!d._date)return{big:esc(d.date),tip:`Shoot day ${d.num}${d.unit==='2nd'?' · 2nd Unit':''}`};
  const dt=d._date;
  return{big:`<span class="wd">${WD[dt.getDay()]}</span>${dt.getDate()} ${MO[dt.getMonth()]}`,
    tip:`Shoot day ${d.num}${d.unit==='2nd'?' · 2nd Unit':''} · ${dt.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}`};
}
function chipDate(d){
  if(!d._date)return d.date;
  const mo=MO[d._date.getMonth()];
  return d._date.getDate()+' '+mo.charAt(0)+mo.slice(1).toLowerCase();
}

// ---------- rate engine ----------
function rates(){
  return {perf:+$('#rPerf').value||0,hol:+$('#rHol').value||0,ins:+$('#rIns').value||0,
    insDays:Math.max(0,Math.floor(+$('#rInsDays').value||0)),usePct:(+$('#rUse').value||0)/100,coord:+$('#rCoord').value||0};
}
function computeCosts(){
  const R=rates();
  const perfUsage=R.perf*R.usePct, coordUsage=R.coord*R.usePct;
  const perfBase=R.perf+R.hol+perfUsage;
  const coordBase=R.coord+R.hol+coordUsage;
  const people={};
  for(const d of MODEL.days){
    const extrasDay={};
    for(const s of d.scenes){
      for(const c of s.cast){
        if(!isStuntTok(c))continue;
        const k=c.code;
        if(!people[k])people[k]={code:k,type:c.type,dayCounts:new Map(),scenes:0};
        people[k].dayCounts.set(d.id,1);people[k].scenes++;
      }
      for(const x of (s.extras||[]))extrasDay[x.name]=Math.max(extrasDay[x.name]||0,x.count);
    }
    for(const [name,count] of Object.entries(extrasDay)){
      const k='x:'+name;
      if(!people[k])people[k]={code:name,type:'stuntExtra',dayCounts:new Map(),scenes:0};
      people[k].dayCounts.set(d.id,count);
    }
  }
  const dayById={};MODEL.days.forEach(d=>dayById[d.id]=d);
  const perDay={},perPerson={};
  for(const [pk,p] of Object.entries(people)){
    const days=[...p.dayCounts.keys()].map(id=>dayById[id]).sort((a,b)=>(a._date||0)-(b._date||0)||a.num-b.num);
    const weekCount={};
    let tot={days:days.length,heads:0,scenes:p.scenes,rate:0,hol:0,ins:0,usage:0,total:0};
    for(const d of days){
      const count=p.dayCounts.get(d.id)||1;
      const wk=d._date?weekKey(d._date):'w?';
      weekCount[wk]=(weekCount[wk]||0)+1;
      const insured=weekCount[wk]<=R.insDays;
      const isCo=p.type==='stuntCoord';
      const rate=isCo?R.coord:R.perf, usage=isCo?coordUsage:perfUsage;
      const perHead=(isCo?coordBase:perfBase)+(insured?R.ins:0);
      const cost=perHead*count;
      tot.heads+=count;
      tot.rate+=rate*count;tot.hol+=R.hol*count;tot.ins+=(insured?R.ins:0)*count;tot.usage+=usage*count;tot.total+=cost;
      if(!perDay[d.id])perDay[d.id]={cost:0,people:[]};
      perDay[d.id].cost+=cost;
      perDay[d.id].people.push({code:p.code,type:p.type,count,insured,rate:rate*count,hol:R.hol*count,ins:(insured?R.ins:0)*count,usage:usage*count,cost});
    }
    perPerson[pk]={...p,...tot};
  }
  const weeks={};
  for(const d of MODEL.days){
    if(!perDay[d.id])continue;
    const wk=d._date?weekKey(d._date):'w?';
    if(!weeks[wk])weeks[wk]={key:wk,days:0,perfDays:0,coordDays:0,ins:0,cost:0,sdCoord:0,dayIds:[]};
    const w=weeks[wk];w.days++;w.dayIds.push(d.id);
    for(const pp of perDay[d.id].people){
      if(pp.type==='stuntCoord')w.coordDays+=pp.count;else w.perfDays+=pp.count;
      w.ins+=pp.ins;
    }
    w.cost+=perDay[d.id].cost;
  }
  // stunt adjustments (fire burns, high falls, etc.)
  let adjGrand=0; const adjRows=[];
  for(const d of MODEL.days){
    const items=ADJ[adjKey(d)]||[];
    if(!items.length)continue;
    if(!perDay[d.id])perDay[d.id]={cost:0,people:[]};
    const sum=items.reduce((a,x)=>a+(+x.amt||0),0);
    perDay[d.id].adjItems=items;
    perDay[d.id].adjTotal=sum;
    perDay[d.id].cost+=sum;
    adjGrand+=sum;
    items.forEach(x=>adjRows.push({dayId:d.id,label:x.label,amt:+x.amt||0}));
    const wk=d._date?weekKey(d._date):'w?';
    if(!weeks[wk])weeks[wk]={key:wk,days:0,perfDays:0,coordDays:0,ins:0,cost:0,sdCoord:0,dayIds:[]};
    if(!weeks[wk].dayIds.includes(d.id)){weeks[wk].days++;weeks[wk].dayIds.push(d.id)}
    weeks[wk].cost+=sum;
  }
  const sdOn=$('#rSDOn').checked;
  const sdRate=+$('#rSDRate').value||0, sdDaysPerWk=Math.max(0,+$('#rSDDays').value||0);
  const sdWeekly=sdRate*sdDaysPerWk;
  let sdTotal=0;
  for(const w of Object.values(weeks)){
    w.sdCoord=sdOn?sdWeekly:0;
    w.cost+=w.sdCoord;
    sdTotal+=w.sdCoord;
  }
  const grand=Object.values(perPerson).reduce((a,p)=>a+p.total,0)+sdTotal+adjGrand;
  COST={R,perfBase,coordBase,perDay,perPerson,dayById,weeks:Object.values(weeks).sort((a,b)=>a.key.localeCompare(b.key)),grand,
    adjRows,adjGrand,
    sd:{on:sdOn,rate:sdRate,daysPerWk:sdDaysPerWk,weekly:sdWeekly,total:sdTotal,weekCount:Object.keys(weeks).length}};
  $('#ratesHint').textContent=`Performer ${gbp(perfBase)}/day + ins · Coordinator ${gbp(coordBase)}/day + ins`;
  $('#ratesCalc').innerHTML=`Performer day = ${gbp(R.perf)} rate + ${gbp(R.hol)} holiday + ${gbp(perfUsage)} usage (${(R.usePct*100).toFixed(1)}% of rate) = <b>${gbp(perfBase)}</b>. Coordinator day = ${gbp(R.coord)} + ${gbp(R.hol)} holiday + ${gbp(coordUsage)} usage = <b>${gbp(coordBase)}</b>. Both carry ${gbp(R.ins)} insurance on the first ${R.insDays} working days each week (capped ${gbp(R.ins*R.insDays)}/person/wk). Additional stunt performers are costed at the performer rate per head. Driving / car / photo doubles are listed but not costed. Stunt department coordinator is a flat ${gbp(sdWeekly)}/week (${gbp(sdRate)} × ${sdDaysPerWk} days) charged in every week that has stunt work${sdOn?'':' — currently switched off'}.`;
}

let CDAY={};
try{CDAY=JSON.parse(store.get('stuntos-cday')||'{}')}catch(e){CDAY={}}
function cdayKey(d){return (d.unit||'Main')+'|'+d.num}

function seedCday(d){
  const chars=[];
  const peak=dayPeakSA(d);
  const saScenes=d.scenes.filter(s=>s.sa>0).map(s=>s.num).join(', ');
  if(peak)chars.push({name:"SA's",count:peak,tier:'SA',scene:saScenes});
  const feats={},spacts={},fsc={},ssc={};
  for(const s of d.scenes){
    for(const f of (s.featured||[])){feats[f.name]=Math.max(feats[f.name]||0,f.count);(fsc[f.name]=fsc[f.name]||[]).push(s.num)}
    for(const f of (s.spacts||[])){spacts[f.name]=Math.max(spacts[f.name]||0,f.count);(ssc[f.name]=ssc[f.name]||[]).push(s.num)}
  }
  for(const [n,c] of Object.entries(feats))chars.push({name:n,count:c,tier:'Featured',scene:[...new Set(fsc[n])].join(', ')});
  for(const [n,c] of Object.entries(spacts))chars.push({name:n,count:c,tier:'SPACT',scene:[...new Set(ssc[n])].join(', ')});
  return {shift:'Day',fw:(d.type||'').toUpperCase().includes('CWD')?'cwd':'std',ph:false,
    call:'07:00',wrap:'18:00',travel:locationBand(d.loc).band,chars};
}

const LOC_A=['canary wharf','chelsea','hammersmith','white city','barbican','regents park','regent\u2019s park','silvertown','westminster','soho','piccadilly','kings cross','king\u2019s cross','waterloo','clerkenwell','southwark','isle of dogs','aldersgate','islington','camden','greenwich','stratford','ealing','brixton','shoreditch','holborn','mayfair','embankment','victoria','paddington','notting hill','tower bridge','london bridge','bank','moorgate','covent garden','leicester square','trafalgar','whitehall','strand','fleet street','temple','blackfriars','battersea','fulham','putney','wandsworth','bermondsey','rotherhithe','canada water','lewisham','deptford','new cross','bow','mile end','bethnal green','hackney','dalston','highbury','finsbury','hampstead','kilburn','maida vale','st johns wood','swiss cottage','kensington','knightsbridge','belgravia','pimlico','vauxhall','elephant','old street','angel','euston','marylebone','tottenham court','russell square','malet street','john adam','great suffolk','union street','waterloo bridge','oxford street','woolwich tunnel'];
const LOC_B=['studio','pinewood','elstree','leavesden','longcross','shepperton','twickenham','high wycombe','oxford','stokenchurch','woolwich','thamesmead','croydon','heathrow','watford','slough','hertford','hatfield','hartford','wembley','richmond','kingston','barnet','enfield','romford','dartford','uxbridge','denham','bray','black park','bovingdon','cardington'];
function locationBand(loc){
  const l=(loc||'').toLowerCase();
  if(!l)return{band:'A',known:false};
  // B first where specific (e.g. 'woolwich' B vs 'woolwich tunnel' A handled by A containing longer phrase)
  for(const a of LOC_A)if(l.includes(a))return{band:'A',known:true,match:a};
  for(const b of LOC_B)if(l.includes(b))return{band:'B',known:true,match:b};
  return{band:'A',known:false};
}
// PACT/FAA 2026 constants (rate card + client-confirmed canon)
const PACT={dayBDR:111.21,nightBDR:166.82,phDay:166.82,phNight:250.22,
  otDay:10.43,otNight:15.65,otPHDay:15.65,otPHNight:23.46,
  hol:0.1207,travelA:17.09,travelB:23.89,early:19.73,stdHrs:9,cwdHrs:7};
// OT & early-call rates DISPLAYED AND CHARGED including 12.07% holiday (client preference — matches SPACT card print)
const OTINC={day:11.69,night:17.54,phDay:17.54,phNight:26.29};
// Take 3 SPACT 2026 rate card (4 Mar – 31 Dec 2026) — separate card from PACT/FAA
const SP3={day:255,night:372,phDay:387.50,phNight:432.50,hol:15.50,fwStd:10,fwCwd:8,earlyTravel:20.91};
function cdTimes(c){
  const [ch,cm]=(c.call||'07:00').split(':').map(Number);
  const [wh,wm]=(c.wrap||'18:00').split(':').map(Number);
  const call=ch+cm/60;let wrap=wh+wm/60;
  if(wrap<=call)wrap+=24;
  return {call,wrap,hours:wrap-call};
}
function cdHours(c){return cdTimes(c).hours}
function cdEarly(c){return cdTimes(c).call<7}
/* PACT/FAA rules (client-confirmed):
   · OT £10.43 / 30 min, always rounded up; blocks falling past 22:00 (or pre-07:00) pay night OT £15.65
   · Early call: every 30 min before 07:00 pays £15.65 (rounded up)
   · Early call travel: called at or before 06:00 → additional £19.73
   · Working day framework counts from 07:00 (pre-07:00 time is covered by early-call payments) */
const numIn=(id,dflt)=>{const el=document.getElementById(id);const v=el?+el.value:NaN;return isFinite(v)&&v>=0?v:dflt};
const gOTd=()=>numIn('cOTday',OTINC.day);
const gOTn=()=>numIn('cOTnight',OTINC.night);
const gETsa=()=>numIn('cET',PACT.early);
const gTA=()=>numIn('cTravelA',PACT.travelA);
const gTB=()=>numIn('cTravelB',PACT.travelB);
const gSpHol=()=>numIn('cSpactHol',SP3.hol);
const gSpNight=()=>numIn('cSpactNight',SP3.night);
const gSpET=()=>numIn('cSpactET',SP3.earlyTravel);
function tierFwHours(c,tier){
  if(tier==='SPACT')return c.fw==='cwd'?SP3.fwCwd:SP3.fwStd;
  return c.fw==='cwd'?PACT.cwdHrs:PACT.stdHrs;
}
function cdPerHead(c,tier){
  const R=crowdRates();
  const night=c.shift==='Night';
  const {call,wrap}=cdTimes(c);
  const spact=tier==='SPACT';
  let base,holAmt,earlyTravelAmt;
  if(spact){
    base=c.ph?(night?SP3.phNight:SP3.phDay):(night?gSpNight():R.spact);
    holAmt=gSpHol();              // payment in lieu of holiday
    earlyTravelAmt=gSpET();       // £20.91 card default
  }else{
    base=tier==='SA'?(c.ph?(night?PACT.phNight:PACT.phDay):(night?PACT.nightBDR:R.sa)):R.feat;
    holAmt=base*R.hol;            // 12.07% on the day rate
    earlyTravelAmt=gETsa();       // £19.73 card default
  }
  // OT + early-call rates charged & shown INCLUSIVE of holiday — editable in the rate card
  const otDayInc=c.ph?OTINC.phDay:gOTd();
  const otNightInc=c.ph?OTINC.phNight:gOTn();
  const fwH=tierFwHours(c,tier);
  const effCall=Math.max(call,7);
  const otH=Math.max(0,(wrap-effCall)-fwH);
  const otBlocks=Math.max(0,Math.ceil(otH*2-1e-9));
  let otDayB=0,otNightB=0;
  const otStart=effCall+fwH;
  for(let i=0;i<otBlocks;i++){
    const t=(otStart+i*0.5)%24;
    if(t>=22||t<7)otNightB++;else otDayB++;   // post-22:00 OT (and past midnight) at night rate — day stays a day shoot
  }
  const ot=otDayB*otDayInc+otNightB*otNightInc;
  const earlyBlocks=call<7?Math.max(0,Math.ceil((7-call)*2-1e-9)):0;
  const earlyPay=earlyBlocks*otNightInc;
  const earlyTravel=call<=6?earlyTravelAmt:0;
  const travel=c.travel==='A'?gTA():c.travel==='B'?gTB():0;
  return {base,otBlocks,otDayB,otNightB,ot,earlyBlocks,earlyPay,earlyTravel,travel,
    hol:holAmt,
    per:base+holAmt+ot+earlyPay+travel+earlyTravel};
}
function cdDayCost(c){
  let cost=0,sa=0,featPD=0,spactPD=0,saCost=0,featCost=0,spactCost=0;
  const feats={},spacts={};
  for(const ch of c.chars){
    const n=+ch.count||0;
    const rowPer=cdPerHead(c,ch.tier).per+(+ch.sup||0); // supplementary fees per head (Featured = SA + sups)
    cost+=rowPer*n;
    if(ch.tier==='SA'){sa+=n;saCost+=rowPer*n}
    else if(ch.tier==='Featured'){featPD+=n;featCost+=rowPer*n;feats[ch.name]=(feats[ch.name]||0)+n}
    else {spactPD+=n;spactCost+=rowPer*n;spacts[ch.name]=(spacts[ch.name]||0)+n}
  }
  return {cost,sa,featPD,spactPD,feats,spacts,saCost,featCost,spactCost};
}

// ---------- crowd engine ----------
let CROWD=null;
function crowdRates(){const sa=+$('#cSA').value||0;return {sa,feat:sa /* Featured = SA BDR + supplementary fees */,spact:+$('#cSpact').value||0,hol:(+$('#cHol').value||0)/100}}
function computeCrowdCosts(){
  const R=crowdRates(), hp=1+R.hol;
  const perDay={},featPeople={},spactPeople={},weeks={};
  let grand=0;
  for(const d of MODEL.days){
    const sa=dayPeakSA(d);
    const feats={},spacts={};
    for(const s of d.scenes){
      for(const f of (s.featured||[]))feats[f.name]=Math.max(feats[f.name]||0,f.count);
      for(const f of (s.spacts||[]))spacts[f.name]=Math.max(spacts[f.name]||0,f.count);
    }
    let featPD=Object.values(feats).reduce((a,n)=>a+n,0);
    let spactPD=Object.values(spacts).reduce((a,n)=>a+n,0);
    const c=CDAY[cdayKey(d)];
    if(!c&&!sa&&!featPD&&!spactPD)continue;
    let entry;
    if(c){
      const r=cdDayCost(c);
      if(!r.sa&&!r.featPD&&!r.spactPD)continue;
      const saPer=cdPerHead(c,'SA').per;
      const tAmt=c.travel==='A'?gTA():c.travel==='B'?gTB():0;
      const headsE=r.sa+r.featPD+r.spactPD;
      const p=cdPerHead(c,'SA');
      entry={sa:r.sa,feats:r.feats,spacts:r.spacts,featPD:r.featPD,spactPD:r.spactPD,cost:r.cost,
        saCost:r.saCost,featCost:r.featCost,spactCost:r.spactCost,
        saComp:{rates:r.sa*p.base,hol:r.sa*p.hol,ot:r.sa*p.ot,early:r.sa*(p.earlyPay+p.earlyTravel),otPer:p.ot,earlyPer:p.earlyPay+p.earlyTravel,otDayB:p.otDayB,otNightB:p.otNightB,earlyBlocks:p.earlyBlocks,earlyTravel:p.earlyTravel>0},
        chars:c.chars.map(x=>x.name+(x.count>1?' ×'+x.count:'')).join(', '),
        travel:{band:c.travel,known:true,amt:tAmt,total:headsE*tAmt},edited:true};
    }else{
      const lb=locationBand(d.loc);
      const tAmt=lb.band==='B'?gTB():gTA();
      const heads=sa+featPD+spactPD;
      entry={sa,feats,spacts,featPD,spactPD,
        cost:sa*R.sa*hp+featPD*R.feat*hp+spactPD*(R.spact+gSpHol())+heads*tAmt,
        saCost:sa*R.sa*hp,featCost:featPD*R.feat*hp,spactCost:spactPD*(R.spact+gSpHol()),
        saComp:{rates:sa*R.sa,hol:sa*R.sa*R.hol,ot:0,early:0,otPer:0,earlyPer:0,otDayB:0,otNightB:0,earlyBlocks:0,earlyTravel:false},
        chars:'',
        travel:{band:lb.band,known:lb.known,amt:tAmt,total:heads*tAmt},edited:false};
    }
    perDay[d.id]=entry;
    grand+=entry.cost;
    if(c){/* rebind loop vars for weekly/people aggregation */}
    
    for(const [name,count] of Object.entries(entry.feats)){
      if(!featPeople[name])featPeople[name]={code:name,dayCounts:new Map(),heads:0,max:0};
      featPeople[name].dayCounts.set(d.id,count);featPeople[name].heads+=count;featPeople[name].max=Math.max(featPeople[name].max,count);
    }
    for(const [name,count] of Object.entries(entry.spacts)){
      if(!spactPeople[name])spactPeople[name]={code:name,dayCounts:new Map(),heads:0,max:0};
      spactPeople[name].dayCounts.set(d.id,count);spactPeople[name].heads+=count;spactPeople[name].max=Math.max(spactPeople[name].max,count);
    }
    const wk=d._date?weekKey(d._date):'w?';
    if(!weeks[wk])weeks[wk]={key:wk,days:0,saDays:0,featDays:0,spactDays:0,cost:0};
    const w=weeks[wk];w.days++;w.saDays+=entry.sa;w.featDays+=entry.featPD;w.spactDays+=entry.spactPD;w.cost+=entry.cost;
  }
  CROWD={R,hp,perDay,featPeople,spactPeople,weeks:Object.values(weeks).sort((a,b)=>a.key.localeCompare(b.key)),grand};
  $('#cratesHint').textContent=`SA ${gbp(R.sa*hp)}/day incl. holiday · Featured = SA rate + supplementary fees`;
  $('#spactHint').textContent=`SPACT ${gbp(R.spact+gSpHol())}/day incl. holiday (in lieu) — Take 3 2026 card`;
  $('#cratesCalc').innerHTML=`PACT/FAA 2026: SA day rate + ${(R.hol*100).toFixed(2)}% holiday; OT and early-call payments charged at holiday-inclusive rates (${gbp(OTINC.day)} day OT / ${gbp(OTINC.night)} night OT &amp; early call per 30 min). There is no separate Featured rate — a Featured SA is the SA basic daily rate plus supplementary fees.`;
  $('#spactCalc').innerHTML=`Take 3 SPACT 2026 (4 Mar – 31 Dec): ${gbp(R.spact)} basic + ${gbp(SP3.hol)} payment in lieu of holiday. SWD 10 hrs (incl. lunch) / CWD 8 hrs; night ${gbp(SP3.night)}; PH ${gbp(SP3.phDay)}/${gbp(SP3.phNight)}; OT ${gbp(OTINC.day)} day, ${gbp(OTINC.night)} after 22:00; early-call travel ${gbp(SP3.earlyTravel)}. Daily counts use each day’s peak requirement. Travel allowance is auto-applied per head from each day’s location (Cat A ${gbp(PACT.travelA)} / Cat B ${gbp(PACT.travelB)}); calls before 07:00 add the ${gbp(PACT.early)} early-call payment via the day calculator. Chits and supplementary fees are the full CrowdOS engine’s territory.`;
}

function backfillScenes(d,c){
  if(!c.chars.some(ch=>ch.scene===undefined))return;
  const saScenes=d.scenes.filter(s=>s.sa>0).map(s=>s.num).join(', ');
  const fsc={},ssc={};
  for(const s of d.scenes){
    for(const f of (s.featured||[]))(fsc[f.name]=fsc[f.name]||[]).push(s.num);
    for(const f of (s.spacts||[]))(ssc[f.name]=ssc[f.name]||[]).push(s.num);
  }
  for(const ch of c.chars){
    if(ch.scene!==undefined)continue;
    if(ch.tier==='SA')ch.scene=saScenes;

const SLD_MIN=240,SLD_MAX=1680; // 04:00 → 04:00 next day
function m2t(m){m=((m%1440)+1440)%1440;return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0')}
function t2m(t){const[a,b]=(t||'0:0').split(':').map(Number);return a*60+(b||0)}
function sliderPos(callT,wrapT){
  let cm=Math.max(SLD_MIN,t2m(callT));
  let wm=t2m(wrapT);if(wm<=cm)wm+=1440;wm=Math.min(SLD_MAX,wm);
  return {cm,wm};
}
function sliderHTML(callT,wrapT,tag){
  const {cm,wm}=sliderPos(callT,wrapT);
  const pct=v=>((v-SLD_MIN)/(SLD_MAX-SLD_MIN)*100);
  const ticks=[[240,'04:00'],[600,'10:00'],[960,'16:00'],[1320,'22:00'],[1680,'04:00']]
    .map(([m,l])=>`<span style="left:${pct(m)}%">${l}</span>`).join('');
  return `<div class="dslider" data-slider="${tag}">
    <div class="track"></div>
    <div class="fill" style="left:${pct(cm)}%;right:${100-pct(wm)}%"></div>
    <input type="range" class="rA" min="${SLD_MIN}" max="${SLD_MAX}" step="5" value="${cm}" aria-label="Call time">
    <input type="range" class="rB" min="${SLD_MIN}" max="${SLD_MAX}" step="5" value="${wm}" aria-label="Wrap time">
    <div class="ticks">${ticks}</div>
  </div>`;
}
function syncSlider(root,callT,wrapT){
  const sl=root.querySelector('.dslider');if(!sl)return;
  const {cm,wm}=sliderPos(callT,wrapT);
  sl.querySelector('.rA').value=cm;sl.querySelector('.rB').value=wm;
  const pct=v=>((v-SLD_MIN)/(SLD_MAX-SLD_MIN)*100);
  const f=sl.querySelector('.fill');f.style.left=pct(cm)+'%';f.style.right=(100-pct(wm))+'%';
}
function cdHrsText(c){
  const p=cdPerHead(c,'SA');
  const fwH=c.fw==='cwd'?PACT.cwdHrs:PACT.stdHrs;
  const {call,wrap}=cdTimes(c);
  const paid=Math.max(0,wrap-Math.max(call,7));
  const otTxt=p.otBlocks?`OT <b>${p.otDayB?p.otDayB+'×30m day':''}${p.otDayB&&p.otNightB?' + ':''}${p.otNightB?p.otNightB+'×30m night':''}</b>`:'no OT';
  const pre=call<7?` · on the clock ${cdHours(c).toFixed(2)}h (pre-07:00 covered by early payments)`:'';
  return `<b>Day ${paid.toFixed(2)}h from ${call<7?'07:00':c.call}</b> · framework ${fwH}h · ${otTxt}${pre}`;
}
function cdEarlyText(c){
  const p=cdPerHead(c,'SA');
  if(!p.earlyBlocks&&!p.earlyTravel)return 'No early call payment (call 07:00+)';
  const bits=[];
  if(p.earlyBlocks)bits.push(`${p.earlyBlocks}×30m before 07:00 = ${gbp(p.earlyPay)}`);
  if(p.earlyTravel)bits.push(`early travel +${gbp(p.earlyTravel)}`);
  return 'Early call: '+bits.join(' · ')+' /head';
}

function dateChips(p){
  const days=[...p.dayCounts.keys()].map(id=>COST.dayById[id]).sort((a,b)=>(a._date||0)-(b._date||0));

  const chips=days.map(chip);
  const LIMIT=8;
  let desktop;
  if(chips.length<=LIMIT)desktop=chips.join('');
  else desktop=chips.slice(0,LIMIT).join('')
    +`<span class="morechips hidden">${chips.slice(LIMIT).join('')}</span>`
    +`<button class="dchip more" data-morechips>+${chips.length-LIMIT} more</button>`;
  // mobile: range + month-grouped drawer (Option C)
  const months={};
  for(const d of days){
    const k=d._date?d._date.getFullYear()+'-'+d._date.getMonth():'?';
    (months[k]=months[k]||{label:d._date?MONFULL[d._date.getMonth()]:'Undated',items:[]}).items.push(d);

  const first=days[0],last=days[days.length-1];

function renderCast(){
  const reg={};
  for(const d of MODEL.days)for(const s of d.scenes)for(const c of s.cast){
    const k=c.code;
    if(!reg[k])reg[k]={code:k,type:c.type,scenes:0,days:new Set()};
    reg[k].scenes++;reg[k].days.add(d.id);
  }
  const extras={};
  for(const d of MODEL.days)for(const s of d.scenes)for(const x of (s.extras||[])){
    if(!extras[x.name])extras[x.name]={name:x.name,scenes:0,days:new Set(),max:0};
    extras[x.name].scenes++;extras[x.name].days.add(d.id);extras[x.name].max=Math.max(extras[x.name].max,x.count);
  }
  const numOf=c=>{const m=String(c).match(/\d+/);return m?+m[0]:9999};
  const groups=[
    ['cast','Cast members',p=>p.type==='cast'],
    ['stuntCoord','Stunt coordinator',p=>p.type==='stuntCoord'],
    ['stuntDbl','Stunt doubles',p=>p.type==='stuntDbl'],
    ['stuntPerf','Stunt performers',p=>p.type==='stuntPerf'],
    ['double','Driving / car / photo doubles',p=>p.type==='double'],
    ['offCam','Off camera',p=>p.type==='offCam']

  let html=groups.map(([t,label,fn])=>{
    const rows=Object.values(reg).filter(fn).sort((a,b)=>numOf(a.code)-numOf(b.code)||String(a.code).localeCompare(String(b.code)));
    if(!rows.length)return'';
    return `<div class="tablecard"><h3>${label}<span class="cnt">${rows.length}</span></h3>

    html+=`<div class="tablecard"><h3>Additional stunt performers<span class="cnt">${xrows.length}</span></h3>
    <div class="tscroll"><table><thead><tr><th>Role</th><th class="num">Max heads</th><th class="num">Scenes</th><th class="num">Days</th></tr></thead><tbody>
    ${xrows.map(p=>`<tr><td class="rowlabel">${esc(p.name)}</td><td class="num">${p.max}</td><td class="num">${p.scenes}</td><td class="num">${p.days.size}</td></tr>`).join('')}
    </tbody></table></div></div>`;
  }
  // stunt + crowd totals
  const ps=Object.values(COST.perPerson);
  const coordD=ps.filter(p=>p.type==='stuntCoord').reduce((a,p)=>a+p.heads,0);
  const sdD=ps.filter(p=>p.type==='stuntDbl').reduce((a,p)=>a+p.heads,0);
  const spD=ps.filter(p=>p.type==='stuntPerf').reduce((a,p)=>a+p.heads,0);
  const xD=ps.filter(p=>p.type==='stuntExtra').reduce((a,p)=>a+p.heads,0);
  const saDays=MODEL.days.reduce((a,d)=>a+dayPeakSA(d),0);
  const featDays=MODEL.days.reduce((a,d)=>a+dayPeakFeat(d),0);
  const spactDays=MODEL.days.reduce((a,d)=>a+dayPeakSpact(d),0);
  let busiest=null;for(const d of MODEL.days){const p=dayPeakSA(d);if(!busiest||p>busiest.p)busiest={d,p}}
  html+=`<div class="tablecard"><h3>Full stunt totals<span class="sum costable">${gbp(COST.grand)}</span></h3>
  <div class="tscroll"><table><tbody>
  <tr><td class="rowlabel">Coordinator days</td><td class="num">${coordD}</td></tr>
  <tr><td class="rowlabel">Stunt double person-days</td><td class="num">${sdD}</td></tr>
  <tr><td class="rowlabel">Stunt performer person-days</td><td class="num">${spD}</td></tr>
  <tr><td class="rowlabel">Additional performer person-days</td><td class="num">${xD}</td></tr>
  <tr><td class="rowlabel">Stunt adjustments</td><td class="num costable">${COST.adjGrand?gbp(COST.adjGrand):'—'}</td></tr>
  <tr><td class="rowlabel">Stunt dept coordinator</td><td class="num costable">${COST.sd.on?gbp(COST.sd.total):'off'}</td></tr>
  <tr class="total"><td>Total stunt personnel-days</td><td class="num">${coordD+sdD+spD+xD}</td></tr>
  </tbody></table></div></div>
  <div class="tablecard"><h3>Full crowd totals</h3>

  <div class="note">Crowd figures are daily peaks summed across the schedule — costing them properly (tiers, chits, supplements) is CrowdOS territory.</div></div>`;
  $('#viewCast').innerHTML=html;
